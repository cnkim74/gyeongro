<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg-j" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </radialGradient>
    <linearGradient id="skin-j" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde2c4"/>
      <stop offset="100%" stop-color="#f4c89a"/>
    </linearGradient>
    <linearGradient id="hair-j" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2618"/>
      <stop offset="100%" stop-color="#1a0f06"/>
    </linearGradient>
    <linearGradient id="beret-j" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9f1239"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
  </defs>
  <!-- bg circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bg-j)"/>
  <!-- shoulders / sweater -->
  <path d="M40 200 Q 100 145 160 200 Z" fill="#c2410c"/>
  <!-- collar accent -->
  <path d="M82 152 Q 100 162 118 152 L 116 168 Q 100 175 84 168 Z" fill="#fef3c7"/>
  <!-- notebook tucked at shoulder -->
  <rect x="138" y="160" width="22" height="28" rx="2" fill="#fef3c7" stroke="#92400e" stroke-width="1.5" transform="rotate(12 149 174)"/>
  <line x1="142" y1="170" x2="156" y2="170" stroke="#92400e" stroke-width="0.8" transform="rotate(12 149 174)"/>
  <line x1="142" y1="175" x2="156" y2="175" stroke="#92400e" stroke-width="0.8" transform="rotate(12 149 174)"/>
  <line x1="142" y1="180" x2="152" y2="180" stroke="#92400e" stroke-width="0.8" transform="rotate(12 149 174)"/>
  <!-- neck -->
  <rect x="88" y="125" width="24" height="22" rx="6" fill="url(#skin-j)"/>
  <!-- head -->
  <ellipse cx="100" cy="95" rx="42" ry="46" fill="url(#skin-j)"/>
  <!-- bob hair (chin-length) -->
  <path d="M55 90 Q 50 55 100 48 Q 150 55 145 90 Q 145 110 142 122 Q 140 105 138 95 Q 100 78 62 95 Q 60 105 58 122 Q 55 110 55 90 Z" fill="url(#hair-j)"/>
  <!-- beret -->
  <ellipse cx="100" cy="58" rx="44" ry="14" fill="url(#beret-j)"/>
  <ellipse cx="100" cy="50" rx="36" ry="18" fill="url(#beret-j)"/>
  <circle cx="124" cy="42" r="6" fill="#7f1d1d"/>
  <ellipse cx="100" cy="48" rx="22" ry="8" fill="#fbbf24" opacity="0.18"/>
  <!-- glasses frame -->
  <circle cx="84" cy="103" r="11" fill="none" stroke="#1f2937" stroke-width="2.2"/>
  <circle cx="116" cy="103" r="11" fill="none" stroke="#1f2937" stroke-width="2.2"/>
  <line x1="95" y1="103" x2="105" y2="103" stroke="#1f2937" stroke-width="2.2"/>
  <line x1="73" y1="100" x2="65" y2="98" stroke="#1f2937" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="127" y1="100" x2="135" y2="98" stroke="#1f2937" stroke-width="2.2" stroke-linecap="round"/>
  <!-- eyes -->
  <ellipse cx="84" cy="103" rx="3.5" ry="4.5" fill="#1f2937"/>
  <ellipse cx="116" cy="103" rx="3.5" ry="4.5" fill="#1f2937"/>
  <circle cx="86" cy="101.5" r="1.2" fill="#fff"/>
  <circle cx="118" cy="101.5" r="1.2" fill="#fff"/>
  <!-- cheeks -->
  <ellipse cx="72" cy="118" rx="6" ry="4" fill="#fda4af" opacity="0.55"/>
  <ellipse cx="128" cy="118" rx="6" ry="4" fill="#fda4af" opacity="0.55"/>
  <!-- smile -->
  <path d="M88 122 Q 100 131 112 122" stroke="#7c2d12" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
