<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg-d" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#e9d5ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </radialGradient>
    <linearGradient id="dog-fur" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde2c4"/>
      <stop offset="100%" stop-color="#d4a574"/>
    </linearGradient>
    <linearGradient id="dog-ear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9a6840"/>
      <stop offset="100%" stop-color="#6b4220"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg-d)"/>
  <!-- body / polo shirt -->
  <path d="M40 200 Q 100 145 160 200 Z" fill="#fafaf9"/>
  <path d="M86 145 L 100 158 L 114 145 L 110 165 L 90 165 Z" fill="#dc2626"/>
  <!-- golf club -->
  <line x1="160" y1="155" x2="180" y2="195" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="180" cy="196" rx="6" ry="3" fill="#9ca3af"/>
  <circle cx="148" cy="160" r="4" fill="#fff" stroke="#9ca3af" stroke-width="1"/>
  <!-- floppy ears (back) -->
  <ellipse cx="58" cy="100" rx="18" ry="32" fill="url(#dog-ear)" transform="rotate(-15 58 100)"/>
  <ellipse cx="142" cy="100" rx="18" ry="32" fill="url(#dog-ear)" transform="rotate(15 142 100)"/>
  <!-- head -->
  <ellipse cx="100" cy="100" rx="44" ry="46" fill="url(#dog-fur)"/>
  <!-- forehead patches -->
  <ellipse cx="78" cy="80" rx="14" ry="10" fill="#9a6840"/>
  <ellipse cx="122" cy="80" rx="14" ry="10" fill="#9a6840"/>
  <!-- visor cap -->
  <path d="M70 64 Q 100 50 130 64 L 130 70 L 70 70 Z" fill="#16a34a"/>
  <ellipse cx="100" cy="70" rx="35" ry="4" fill="#15803d"/>
  <path d="M100 50 L 100 60" stroke="#fff" stroke-width="1"/>
  <!-- snout -->
  <ellipse cx="100" cy="120" rx="22" ry="16" fill="#fef3c7"/>
  <!-- nose -->
  <ellipse cx="100" cy="112" rx="6" ry="4.5" fill="#1f2937"/>
  <!-- mouth open (happy) -->
  <path d="M100 116 L 100 122 Q 90 132 84 124 M 100 122 Q 110 132 116 124" stroke="#1f2937" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- tongue -->
  <path d="M94 128 Q 100 134 106 128 Q 102 132 100 134 Q 98 132 94 128 Z" fill="#fb7185"/>
  <!-- eyes -->
  <ellipse cx="80" cy="98" rx="5" ry="6" fill="#1f2937"/>
  <ellipse cx="120" cy="98" rx="5" ry="6" fill="#1f2937"/>
  <circle cx="82" cy="96" r="1.5" fill="#fff"/>
  <circle cx="122" cy="96" r="1.5" fill="#fff"/>
  <!-- cheeks -->
  <ellipse cx="64" cy="118" rx="5" ry="3" fill="#fda4af" opacity="0.6"/>
  <ellipse cx="136" cy="118" rx="5" ry="3" fill="#fda4af" opacity="0.6"/>
</svg>
