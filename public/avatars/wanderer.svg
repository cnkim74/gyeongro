<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg-w" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </radialGradient>
    <linearGradient id="skin-w" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde2c4"/>
      <stop offset="100%" stop-color="#f4c89a"/>
    </linearGradient>
    <linearGradient id="hat-w" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="hair-w" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3f2917"/>
      <stop offset="100%" stop-color="#1f1408"/>
    </linearGradient>
  </defs>
  <!-- bg circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bg-w)"/>
  <!-- shoulders / scarf -->
  <path d="M40 200 Q 100 145 160 200 Z" fill="#1e40af"/>
  <ellipse cx="100" cy="155" rx="38" ry="10" fill="#dc2626"/>
  <!-- neck -->
  <rect x="88" y="125" width="24" height="22" rx="6" fill="url(#skin-w)"/>
  <!-- head -->
  <ellipse cx="100" cy="95" rx="42" ry="46" fill="url(#skin-w)"/>
  <!-- hair fringe -->
  <path d="M60 78 Q 100 50 140 78 Q 138 65 100 56 Q 62 65 60 78 Z" fill="url(#hair-w)"/>
  <!-- safari hat -->
  <ellipse cx="100" cy="62" rx="58" ry="9" fill="url(#hat-w)"/>
  <ellipse cx="100" cy="48" rx="32" ry="22" fill="url(#hat-w)"/>
  <ellipse cx="100" cy="44" rx="28" ry="14" fill="#fcd34d" opacity="0.5"/>
  <!-- band -->
  <path d="M70 60 Q 100 67 130 60 L 130 64 Q 100 71 70 64 Z" fill="#7f1d1d"/>
  <!-- eyes -->
  <ellipse cx="84" cy="100" rx="5" ry="6" fill="#1f2937"/>
  <ellipse cx="116" cy="100" rx="5" ry="6" fill="#1f2937"/>
  <circle cx="86" cy="98" r="1.5" fill="#fff"/>
  <circle cx="118" cy="98" r="1.5" fill="#fff"/>
  <!-- cheeks -->
  <ellipse cx="74" cy="115" rx="6" ry="4" fill="#fda4af" opacity="0.6"/>
  <ellipse cx="126" cy="115" rx="6" ry="4" fill="#fda4af" opacity="0.6"/>
  <!-- smile -->
  <path d="M88 120 Q 100 130 112 120" stroke="#7c2d12" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
