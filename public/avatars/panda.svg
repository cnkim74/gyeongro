<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg-p" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#86efac"/>
    </radialGradient>
    <linearGradient id="panda-white" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e5e7eb"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg-p)"/>
  <!-- body / shirt -->
  <path d="M40 200 Q 100 145 160 200 Z" fill="#0e7490"/>
  <!-- bamboo accessory -->
  <rect x="50" y="155" width="6" height="40" rx="2" fill="#65a30d" transform="rotate(-15 53 175)"/>
  <ellipse cx="48" cy="158" rx="8" ry="4" fill="#84cc16"/>
  <!-- ears -->
  <ellipse cx="62" cy="58" rx="18" ry="20" fill="#1f2937"/>
  <ellipse cx="138" cy="58" rx="18" ry="20" fill="#1f2937"/>
  <ellipse cx="62" cy="60" rx="9" ry="11" fill="#374151"/>
  <ellipse cx="138" cy="60" rx="9" ry="11" fill="#374151"/>
  <!-- head -->
  <ellipse cx="100" cy="100" rx="50" ry="48" fill="url(#panda-white)"/>
  <!-- traveler hat (chinese style straw hat) -->
  <path d="M40 75 Q 100 50 160 75 L 158 80 Q 100 60 42 80 Z" fill="#fbbf24"/>
  <ellipse cx="100" cy="75" rx="60" ry="6" fill="#d97706"/>
  <ellipse cx="100" cy="60" rx="20" ry="12" fill="#fbbf24"/>
  <!-- eye patches -->
  <ellipse cx="78" cy="100" rx="14" ry="18" fill="#1f2937" transform="rotate(-15 78 100)"/>
  <ellipse cx="122" cy="100" rx="14" ry="18" fill="#1f2937" transform="rotate(15 122 100)"/>
  <!-- eyes -->
  <ellipse cx="80" cy="102" rx="4" ry="5" fill="#fff"/>
  <ellipse cx="120" cy="102" rx="4" ry="5" fill="#fff"/>
  <ellipse cx="81" cy="103" rx="2.5" ry="3" fill="#1f2937"/>
  <ellipse cx="121" cy="103" rx="2.5" ry="3" fill="#1f2937"/>
  <!-- nose -->
  <ellipse cx="100" cy="122" rx="6" ry="4" fill="#1f2937"/>
  <!-- mouth -->
  <path d="M100 126 L 100 132 M 100 132 Q 94 138 90 134 M 100 132 Q 106 138 110 134" stroke="#1f2937" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- cheeks -->
  <ellipse cx="62" cy="120" rx="6" ry="4" fill="#fda4af" opacity="0.6"/>
  <ellipse cx="138" cy="120" rx="6" ry="4" fill="#fda4af" opacity="0.6"/>
</svg>
